<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Redes - Estilo Clásico</title>
    <style>
        :root {
            --bg: #d1d5db; --body-bg: #9ca3af; --lcd: #374151; --btn: #4b5563;
        }
        body.dark-mode { --bg: #1f2937; --body-bg: #111827; --lcd: #000; --btn: #374151; }
        
        body { font-family: 'Courier New', Courier, monospace; background: var(--body-bg); display: flex; justify-content: center; padding: 20px; transition: 0.3s; }
        
        .calculator {
            background: var(--bg); padding: 20px; border-radius: 20px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3), inset -5px -5px 10px rgba(255,255,255,0.2);
            width: 350px; border: 8px solid #6b7280;
        }

        .screen {
            background: var(--lcd); color: #10b981; padding: 15px; border-radius: 5px;
            font-size: 14px; height: 100px; overflow-y: auto; margin-bottom: 20px;
            border: 4px inset #9ca3af; text-align: left;
        }

        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #666; border-radius: 0; }
        button { 
            background: var(--btn); color: white; border: none; padding: 12px; margin: 5px 0;
            width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px;
            box-shadow: 2px 2px 0px #333;
        }
        button:active { transform: translateY(2px); box-shadow: none; }
        .theme-btn { background: #ef4444; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="calculator">
    <button class="theme-btn" onclick="toggleTheme()">Modo Color</button>
    
    <div id="display" class="screen">Calculadora de Redes V1.0</div>

    <input type="text" id="ip" placeholder="IP">
    <input type="number" id="mask" placeholder="Máscara (ej. 24)">
    <button onclick="analizar()">Analizar Red</button>
    
    <input type="number" id="subs" placeholder="Subredes deseadas">
    <button onclick="subnetFijo()">Calcular Fijo</button>
    
    <input type="text" id="vlsmList" placeholder="VLSM (ej: 50, 20, 2)">
    <button onclick="calcularVLSM()">Calcular VLSM</button>
</div>

<script>
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    
    function log(msg) { document.getElementById('display').innerText = msg; }

    function analizar() {
        const mask = parseInt(document.getElementById('mask').value);
        const hosts = Math.pow(2, 32 - mask) - 2;
        log(`Red: /${mask}\nTotal IPs: ${Math.pow(2, 32-mask)}\nHosts: ${hosts > 0 ? hosts : 0}`);
    }

    function subnetFijo() {
        const subs = parseInt(document.getElementById('subs').value);
        const mask = parseInt(document.getElementById('mask').value);
        const bits = Math.ceil(Math.log2(subs));
        log(`Bits tomados: ${bits}\nNueva Máscara: /${mask + bits}`);
    }

    function calcularVLSM() {
        const input = document.getElementById('vlsmList').value;
        const reqs = input.split(',').map(n => parseInt(n.trim())).sort((a,b) => b-a);
        let out = "VLSM Results:\n";
        reqs.forEach(r => {
            let n = 0; while(Math.pow(2, n) - 2 < r) n++;
            out += `${r} hosts -> /${32 - n}\n`;
        });
        log(out);
    }
</script>
</body>
</html>
