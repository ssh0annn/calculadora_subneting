<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Redes Avanzada</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
        input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
        pre { background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. Analizar Red</h2>
    <input type="text" id="ip" placeholder="IP (ej. 192.168.1.0)">
    <input type="number" id="mask" placeholder="Máscara (ej. 24)">
    <button onclick="analizar()">Analizar</button>
    <pre id="res1">Esperando datos...</pre>
</div>

<div class="card">
    <h2>2. Subnetting (Fijo)</h2>
    <input type="number" id="subs" placeholder="Cantidad de subredes deseadas">
    <button onclick="subnetFijo()">Calcular Fijo</button>
    <pre id="res2">...</pre>
</div>

<div class="card">
    <h2>3. VLSM</h2>
    <input type="text" id="vlsmList" placeholder="Hosts por subred (ej: 50, 20, 2)">
    <button onclick="calcularVLSM()">Calcular VLSM</button>
    <pre id="res3">...</pre>
</div>

<script>
    function analizar() {
        const mask = parseInt(document.getElementById('mask').value);
        const hosts = Math.pow(2, 32 - mask) - 2;
        document.getElementById('res1').innerText = `Red: /${mask}\nTotal IPs: ${Math.pow(2, 32-mask)}\nHosts utilizables: ${hosts > 0 ? hosts : 0}`;
    }

    function subnetFijo() {
        const subs = parseInt(document.getElementById('subs').value);
        const bits = Math.ceil(Math.log2(subs));
        document.getElementById('res2').innerText = `Bits a tomar: ${bits}\nNueva Máscara: /${parseInt(document.getElementById('mask').value) + bits}`;
    }

    function calcularVLSM() {
        const input = document.getElementById('vlsmList').value;
        const requirements = input.split(',').map(n => parseInt(n.trim())).sort((a,b) => b-a);
        let output = "Subredes requeridas (ordenadas):\n";
        requirements.forEach((req, i) => {
            let n = 0;
            while(Math.pow(2, n) - 2 < req) n++;
            output += `Req ${req} hosts: /${32 - n}\n`;
        });
        document.getElementById('res3').innerText = output;
    }
</script>
</body>
</html>
